# hrdr default theme — compiled into the binary as the fallback.
# Colours follow the hjkl-theme format. Add hrdr-specific entries
# prefixed `bg_` for background roles.

[palette]
bg       = "#0d1117"
fg       = "#c9d1d9"
comment  = "#484f58"
red      = "#f85149"
orange   = "#d29922"
yellow   = "#e3b341"
green    = "#3fb950"
teal     = "#40c9a2"
blue     = "#58a6ff"
mauve    = "#bc8cff"

# hrdr-specific background entries (overridable via user theme).
bg_user  = "#0d2b36"
bg_tool  = "#161b22"

[ui]
background = "$bg"
foreground = "$fg"
cursor     = "$blue"
cursorline = "#1c2128"
gutter     = "$comment"
diagnostic_error = "$red"

[ui.selection]
bg = "#21262d"
